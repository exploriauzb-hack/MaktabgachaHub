<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaktabgachaHub — Kunlik jadval</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
    .day-tab {
      background: #e8e4ff; border: none; border-radius: 12px;
      padding: 8px 16px; cursor: pointer; font-size: .85rem;
      color: var(--p); font-weight: 600; transition: all .2s;
    }
    .day-tab:hover { background: #d8d0ff; }
    .day-tab.active { background: var(--p); color: #fff; }

    .sched-list { display: flex; flex-direction: column; gap: 8px; }
    .sched-item {
      background: #fff; border-radius: 12px; padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
      transition: transform .15s;
    }
    .sched-item:hover { transform: translateX(4px); }
    .time-b {
      background: linear-gradient(135deg, var(--p), var(--p2));
      color: #fff; border-radius: 10px; padding: 5px 10px;
      font-size: .72rem; font-weight: 700; white-space: nowrap;
      min-width: 92px; text-align: center;
    }
    .sched-icon { font-size: 1.3rem; }
    .sched-name { font-size: .87rem; font-weight: 600; }
    .sched-desc { font-size: .76rem; color: var(--mu); margin-top: 2px; }

    .day-summary {
      display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap;
    }
    .summary-chip {
      background: #fff; border-radius: 10px; padding: 8px 14px;
      font-size: .78rem; box-shadow: 0 2px 8px rgba(0,0,0,.05);
      display: flex; align-items: center; gap: 6px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="../dashboard.html" class="nav-logo">🎓 MaktabgachaHub</a>
  <div class="nav-links">
    <a href="../dashboard.html" class="nav-btn">← Dashboard</a>
    <div class="nav-user">
      <span id="nav-name">—</span>
      <span class="nav-badge" id="nav-plan">Bepul</span>

  </div>
</nav>

<div class="container">

    Har bir mashg'ulot rivojlanish sohalariga mos integratsiyalashgan.

  <div class="day-tabs" id="day-tabs">

  <div class="day-summary" id="day-summary"></div>

  <div id="day-content" class="sched-list"></div>

</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

var dayNames = { dush:'Dushanba', sesh:'Seshanba', chor:'Chorshanba', pay:'Payshanba', juma:'Juma' }

window.addEventListener('load', async () => {
  const auth = await initAuth(true)
  if (!auth) return
  fillNav()
  showDay('dush')

  document.querySelectorAll('.day-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      showDay(btn.dataset.day)
    })
  })
})

function showDay(day) {
  const items = dailyData[day]

  // Summary chips
  const mashgulotCount = items.filter(i => i.name.includes('mashg\'ulot')).length
  document.getElementById('day-summary').innerHTML = `
    <div class="summary-chip">📌 <b>${dayNames[day]}</b></div>
    <div class="summary-chip">⏰ ${items[0].time.split('-')[0]} — ${items[items.length-1].time.split('-')[1]}</div>
    <div class="summary-chip">📝 ${mashgulotCount} ta mashg'ulot</div>
    <div class="summary-chip">🎯 ${items.length} ta faoliyat</div>
  `

  document.getElementById('day-content').innerHTML = items.map(i => `
    <div class="sched-item">
      <div class="time-b">${i.time}</div>
      <div class="sched-icon">${i.icon}</div>
      <div>
        <div class="sched-name">${i.name}</div>
        <div class="sched-desc">${i.desc}</div>
      </div>
    </div>
  `).join('')
}
