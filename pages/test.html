  <style>
    .tc-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(108,71,255,.08);
      cursor: pointer;
      transition: all .2s;
      border: 2px solid transparent;
      position: relative;
    }
    .tc-card:hover { border-color: var(--p); transform: translateY(-3px); }
    .tc-icon { font-size: 2.2rem; margin-bottom: 8px; }
    .tc-card h3 { font-size: .95rem; font-weight: 800; margin-bottom: 4px; }
    .tc-card p  { font-size: .78rem; color: var(--mu); }
    .tc-count {
      position: absolute; top: 12px; right: 12px;
      background: var(--p); color: #fff;
      border-radius: 10px; padding: 2px 9px;
      font-size: .7rem; font-weight: 700;
    }

    .tpbar { background: #e8e4ff; border-radius: 10px; height: 7px; margin-bottom: 16px; }
    .tpfill { background: linear-gradient(90deg,var(--p),var(--p2)); height: 100%; border-radius: 10px; transition: width .4s; }

    .tq { font-size: 1rem; font-weight: 700; color: var(--tx); margin-bottom: 16px; line-height: 1.5; }
    .topts { display: flex; flex-direction: column; gap: 9px; }
    .topt {
      background: #f8f6ff; border: 2px solid var(--br); border-radius: 12px;
      padding: 12px 16px; cursor: pointer; font-size: .88rem; color: var(--tx);
      transition: all .2s; text-align: left;
    }
    .topt:hover { border-color: var(--p); background: #ede9ff; }
    .topt.correct { background: #dcfce7; border-color: #22c55e; color: #166534; }
    .topt.wrong   { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
    .topt.disabled { pointer-events: none; }

    .texpl {
      background: #f0fff4; border-radius: 10px; padding: 11px 14px;
      margin-top: 12px; font-size: .82rem; color: #166534; display: none;
      border-left: 3px solid #22c55e; line-height: 1.6;
    }
    .texpl.show { display: block; }
    .texpl.werr { background: #fff1f2; color: #991b1b; border-left-color: #ef4444; }

    .res-circle {
      width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; color: #fff;
    }
    .rc-gold  { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .rc-green { background: linear-gradient(135deg,#22c55e,#16a34a); }
    .rc-blue  { background: linear-gradient(135deg,#3b82f6,#1d4ed8); }
    .rc-red   { background: linear-gradient(135deg,#ef4444,#dc2626); }

    .res-bd { background: #f8f6ff; border-radius: 12px; padding: 14px; margin-bottom: 16px; text-align: left; }
    .rb-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--br); font-size: .83rem; }
    .rb-row:last-child { border-bottom: none; }

    .limit-box {
      background: #fff7ed; border: 2px solid #fed7aa; border-radius: 14px;
      padding: 16px; text-align: center; margin-bottom: 20px;
    }
  </style>
</head>

var testState = {}

window.addEventListener('load', async () => {
  const auth = await initAuth(true)
  if (!auth) return
  fillNav()

  if (!isPro()) {
    const limit = await checkTestLimit()
    if (!limit.allowed) {
      document.getElementById('limit-box').style.display = 'block'
      document.getElementById('limit-text').textContent =
        `Bu oy ${limit.count}/${limit.limit} test ishlandi`
    }
  }

  renderTestGrid()
})

async function renderTestGrid() {
  let bestScores = {}
  const { data: tests } = await _sb
    .from('test_results')
    .select('category, percentage')
    .eq('user_id', _currentUser.id)

  if (tests) {
    tests.forEach(t => {
      if (!bestScores[t.category] || t.percentage > bestScores[t.category]) {
        bestScores[t.category] = t.percentage
      }
    })
  }

  document.getElementById('test-grid').innerHTML = TEST_CATS.map(c => {
    const best = bestScores[c.id]
    const stars = best === undefined ? "Hali ishlanmagan"
      : best >= 90 ? "A'lo (3 yulduz)"
      : best >= 70 ? "Yaxshi (2 yulduz)"
      : best >= 50 ? "Qoniqarli (1 yulduz)"
      : "Qayta ishlang"
    const bar = best !== undefined
      ? `<div class="pbar" style="margin-top:8px"><div class="pfill" style="width:${best}%"></div></div>`
      : ''
    return `<div class="tc-card" onclick="startTest('${c.id}','${c.title}')">
      <div class="tc-count">${QUESTIONS[c.id].length} savol</div>
      <div class="tc-icon">${c.icon}</div>
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      ${bar}
      <div style="margin-top:6px;font-size:.8rem;color:var(--mu)">
        ${stars}${best !== undefined ? ' (' + best + '%)' : ''}
      </div>
    </div>`
  }).join('')
}

async function startTest(catId, catTitle) {
  if (!isPro()) {
    const limit = await checkTestLimit()
    if (!limit.allowed) {
      showToast('Oylik test limitiga yetdingiz! Premium oling.', 'err')
      return
    }
  }

  const qs = QUESTIONS[catId].slice().sort(() => Math.random() - 0.5)
  testState = { catId, catTitle, qs, cur: 0, answers: [], answered: false }
  document.getElementById('test-modal-title').textContent = catTitle
  document.getElementById('test-modal').classList.add('show')
  renderQ()
}

function closeTest() {
  document.getElementById('test-modal').classList.remove('show')
}

function renderQ() {
  const s = testState
  if (s.cur >= s.qs.length) { showResult(); return }
  const q = s.qs[s.cur]
  const pct = Math.round((s.cur / s.qs.length) * 100)
  const optsHtml = q.opts.map((o, i) =>
    `<button class="topt" id="opt-${i}" onclick="selectOpt(${i})">${o}</button>`
  ).join('')

  document.getElementById('test-body').innerHTML = `
    <div style="font-size:.78rem;color:var(--mu);margin-bottom:5px">${s.cur+1} / ${s.qs.length} savol</div>
    <div class="tpbar"><div class="tpfill" style="width:${pct}%"></div></div>
    <div class="tq">${q.q}</div>
    <div class="topts">${optsHtml}</div>
    <div class="texpl" id="texpl"></div>
    <div style="display:flex;gap:10px;margin-top:18px;justify-content:space-between;align-items:center">
      <span style="font-size:.8rem;color:var(--mu)">${s.answers.filter(Boolean).length} togri</span>
      <button class="btn-primary" style="width:auto;padding:10px 20px" id="tnext" onclick="nextQ()" disabled>Keyingi</button>
    </div>
  `
}

function selectOpt(i) {
  if (testState.answered) return
  testState.answered = true
  const q = testState.qs[testState.cur]
  const correct = i === q.ans
  testState.answers.push(correct)

  document.querySelectorAll('.topt').forEach((b, idx) => {
    b.classList.add('disabled')
    if (idx === q.ans) b.classList.add('correct')
    else if (idx === i) b.classList.add('wrong')
  })

  const exp = document.getElementById('texpl')
  exp.textContent = (correct ? 'Togri! ' : 'Notogri. ') + q.exp
  exp.className = 'texpl show' + (correct ? '' : ' werr')
  document.getElementById('tnext').disabled = false
}

function nextQ() {
  testState.cur++
  testState.answered = false
  renderQ()
}

async function showResult() {
  const s = testState
  const correct = s.answers.filter(Boolean).length
  const pct = Math.round((correct / s.qs.length) * 100)
  const xpEarned = correct * 5

  let grade, gradeColor, stars, advice
  if (pct >= 90) { grade='ALO'; gradeColor='rc-gold'; stars="Mukammal!"; advice="Ajoyib! Bu mavzuni yaxshi bilasiz." }
  else if (pct >= 70) { grade='YAXSHI'; gradeColor='rc-green'; stars="Yaxshi!"; advice="Yaxshi natija." }
  else if (pct >= 50) { grade='QONIQARLI'; gradeColor='rc-blue'; stars="Qoniqarli"; advice="Mavzuni chuqurroq organish kerak." }
  else { grade='PAST'; gradeColor='rc-red'; stars="Qayta ishlang"; advice="Mavzuni qayta oqib, testni takrorlang." }

  // DB ga saqlash
  await _sb.from('test_results').insert({
    user_id: _currentUser.id,
    category: s.catTitle,
    score: correct,
    total: s.qs.length,
    percentage: pct,
    xp_earned: xpEarned
  })

  await addXP(xpEarned)

  document.getElementById('test-body').innerHTML = `
    <div style="text-align:center;padding:20px 10px">
      <div class="res-circle ${gradeColor}">${pct}%<div style="font-size:.5rem;margin-top:2px">${grade}</div></div>
      <div style="font-size:1.4rem;font-weight:800;margin-bottom:6px">${stars}</div>
      <div style="font-size:.85rem;color:var(--mu);margin-bottom:18px">${advice}</div>
      <div class="res-bd">
        <div class="rb-row"><span>Togri javoblar</span><b style="color:#22c55e">${correct} ta</b></div>
        <div class="rb-row"><span>Notogri javoblar</span><b style="color:#ef4444">${s.qs.length-correct} ta</b></div>
        <div class="rb-row"><span>Jami savollar</span><b>${s.qs.length} ta</b></div>
        <div class="rb-row"><span>XP qoshildi</span><b style="color:var(--go)">+${xpEarned} XP</b></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="startTest('${s.catId}','${s.catTitle}')">Qayta ishlash</button>
        <button class="btn-secondary" onclick="closeTest()">Yopish</button>
      </div>
    </div>
  `
  renderTestGrid()
}
</script>
