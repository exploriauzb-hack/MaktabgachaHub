<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3–4 yosh | Sentyabr Konspektlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;--surface:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;
  --accent:#0369a1;--accent-soft:#e0f2fe;--pro:#7c3aed;--pro-soft:#f5f3ff;
  --green:#15803d;--green-soft:#f0fdf4;--amber:#b45309;--amber-soft:#fffbeb;
  --red:#b91c1c;
}
body{font-family:'Inter',sans-serif;color:var(--text);font-size:14px;background:var(--bg);padding:20px;max-width:960px;margin:0 auto}

/* HEADER */
.page-header{background:linear-gradient(135deg,#0369a1,#0284c7);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.ph-icon{width:52px;height:52px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-icon i{font-size:26px}
.ph-info h2{font-size:17px;font-weight:700;margin-bottom:4px}
.ph-info p{font-size:12px;opacity:.85;line-height:1.5}
.ph-badges{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.ph-badge{background:rgba(255,255,255,.2);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.stat .num{font-size:22px;font-weight:700;color:var(--accent)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* FILTER */
.filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar select{padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text);background:var(--bg);outline:none;font-family:'Inter',sans-serif}
.btn-reset{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.btn-reset:hover{background:var(--bg)}

/* WEEK DIVIDER */
.week-div{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.week-div .wline{flex:1;height:1px;background:var(--border)}
.week-label{font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;background:var(--accent-soft);color:var(--accent);border:1px solid #bae6fd;white-space:nowrap;display:flex;align-items:center;gap:5px}

/* KN CARD */
.kn-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.kn-card:hover{border-color:#7dd3fc}
.kn-hdr{padding:13px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.kn-hdr:hover{background:var(--bg)}
.kn-num{width:30px;height:30px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.kn-num.pro{background:var(--pro-soft);color:var(--pro)}
.kn-info{flex:1;min-width:0}
.kn-meta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.kb{border-radius:20px;padding:2px 8px;font-size:10px;font-weight:600;white-space:nowrap}
.kb.kun{background:var(--amber-soft);color:var(--amber)}
.kb.soha{background:var(--green-soft);color:var(--green)}
.kb.kod{background:#f1f5f9;color:#475569}
.kb.free{background:#f0fdf4;color:#15803d}
.kb.pro-tag{background:var(--pro-soft);color:var(--pro)}
.kn-title{font-size:13px;font-weight:600}
.kn-arrow{color:var(--muted);font-size:14px;flex-shrink:0;transition:transform .2s}
.kn-body{display:none;border-top:1px solid var(--border)}
.kn-body.open{display:block}

/* BODY CONTENT */
.kn-content{padding:14px 16px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.info-box-kn{background:var(--bg);border-radius:8px;padding:10px 12px}
.info-box-kn h5{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:5px;font-weight:700;display:flex;align-items:center;gap:4px}
.info-box-kn p{font-size:12px;color:var(--text);line-height:1.7}
.info-box-kn.full{grid-column:1/-1}
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.step-box{background:var(--accent-soft);border-radius:8px;padding:10px 12px;border-left:3px solid var(--accent)}
.step-time{font-size:10px;font-weight:700;color:#0369a1;margin-bottom:3px}
.step-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.step-desc{font-size:11.5px;color:#374151;line-height:1.6}
.btn-print{margin-top:4px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.btn-print:hover{opacity:.9}

/* PRO LOCK */
.pro-lock-body{padding:18px;text-align:center;background:linear-gradient(135deg,#f5f3ff,#ede9fe)}
.pro-lock-body .lock-icon{font-size:28px;color:var(--pro);margin-bottom:8px}
.pro-lock-body h4{font-size:14px;font-weight:700;color:var(--pro);margin-bottom:4px}
.pro-lock-body p{font-size:12px;color:var(--muted);margin-bottom:12px}
.btn-pro{background:linear-gradient(135deg,var(--pro),#a855f7);color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .info-grid,.steps-grid{grid-template-columns:1fr}
  .info-box-kn.full{grid-column:1}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="ph-icon"><i class="ti ti-baby-carriage"></i></div>
  <div class="ph-info">
    <h2>3–4 yosh (Kichik guruh) — Sentyabr oyi</h2>
    <p>"Ilk Qadam" milliy dasturi asosida. Kodlar: a (3–4 yosh). 4 hafta × 5 kun = 20 ta to'liq konspekt.</p>
    <div class="ph-badges">
      <span class="ph-badge"><i class="ti ti-calendar" style="font-size:10px"></i> 4 hafta</span>
      <span class="ph-badge"><i class="ti ti-notebook" style="font-size:10px"></i> 20 konspekt</span>
      <span class="ph-badge" style="background:rgba(255,220,50,.25)"><i class="ti ti-lock-open" style="font-size:10px"></i> 5 ta bepul</span>
      <span class="ph-badge" style="background:rgba(168,85,247,.3)"><i class="ti ti-crown" style="font-size:10px"></i> 15 ta PRO</span>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="num">20</div><div class="lbl">Jami konspekt</div></div>
  <div class="stat"><div class="num">5</div><div class="lbl">Rivojlanish sohasi</div></div>
  <div class="stat"><div class="num" style="color:#15803d">5</div><div class="lbl">Bepul</div></div>
  <div class="stat"><div class="num" style="color:var(--pro)">15</div><div class="lbl">PRO</div></div>
</div>

<div class="filter-bar">
  <select id="f-hafta" onchange="applyFilter()"><option value="">Barcha haftalar</option><option>1-hafta</option><option>2-hafta</option><option>3-hafta</option><option>4-hafta</option></select>
  <select id="f-soha" onchange="applyFilter()"><option value="">Barcha sohalar</option><option>1-soha: Jismoniy</option><option>2-soha: Ijtimoiy-hissiy</option><option>3-soha: Nutq</option><option>4-soha: Bilish</option><option>5-soha: Ijodiy</option></select>
  <select id="f-kun" onchange="applyFilter()"><option value="">Barcha kunlar</option><option>Dushanba</option><option>Seshanba</option><option>Chorshanba</option><option>Payshanba</option><option>Juma</option></select>
  <button class="btn-reset" onclick="resetFilter()"><i class="ti ti-filter-off"></i> Tozalash</button>
</div>

<div id="kn-list"></div>

<script>
var FREE_LIMIT=5;

var knList=[
  // ===== 1-HAFTA =====
  {

    mavzu:"Men va mening bog'cham — yangi muhit",

    jihozlar:"Guruh fotosi, har bir bolaning surati, rangli kartochkalar, qo'g'irchoq, stikерlar",

    izoh:"Birinchi kun! Bolalar qo'rqishi mumkin. Hech qachon majburlamang, o'yin shaklida ishlang. Ota-onalar bilan 10 daqiqa birga bo'lishga ruxsat bering.",

      {t:"Motivatsiya (5 daq)",n:"Qo'g'irchoq mehmonga keldi",d:"Qo'g'irchoq 'Voy, bu yer qanday chiroyli! Bu yerda o'ynash mumkinmi? Kim bor bu yerda?' deydi. Bolalar qo'g'irchoqqa guruhni tanishtiradilar."},

      {t:"Jismoniy (2 daq)",n:"'Birgamiz' o'yini",d:"Qo'llarni ushlashib: 'Biz do'stmiz, biz birga, bog'chamiz bizniki!' — bir marta birgalikda aytadilar."},

// ===================== RENDER =====================
function render(list){
  const container=document.getElementById('kn-list');
  if(!list.length){
    container.innerHTML='<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;color:var(--muted);font-size:13px"><i class="ti ti-search" style="font-size:24px;display:block;margin-bottom:8px"></i>Filterlarga mos konspekt topilmadi.</div>';
    return;
  }
  let weeks=[...new Set(list.map(k=>k.hafta))];
  let html='';
  weeks.forEach(w=>{
    let wItems=list.filter(k=>k.hafta===w);
    if(!wItems.length)return;
    html+=`<div class="week-div"><div class="wline"></div><span class="week-label"><i class="ti ti-calendar-week" style="font-size:11px"></i>${w} (Sentyabr)</span><div class="wline"></div></div>`;
    wItems.forEach(k=>{
      const locked=k.isPro;
      const idx=k.id;
      html+=`<div class="kn-card">
        <div class="kn-hdr" onclick="tog(${idx})">
          <div class="kn-num ${locked?'pro':''}">${idx}</div>
          <div class="kn-info">
            <div class="kn-meta">
              <span class="kb kun"><i class="ti ti-calendar-event" style="font-size:9px"></i> ${k.kun}</span>
              <span class="kb soha">${k.soha}</span>
              <span class="kb kod">${k.kod}</span>
              ${locked?'<span class="kb pro-tag"><i class="ti ti-crown" style="font-size:9px"></i> PRO</span>':'<span class="kb free"><i class="ti ti-lock-open" style="font-size:9px"></i> Bepul</span>'}
            </div>
            <div class="kn-title">${k.mavzu}</div>
          </div>
          <i class="ti ti-chevron-down kn-arrow" id="arr${idx}" style="color:var(--muted);font-size:14px;flex-shrink:0;transition:transform .2s"></i>
        </div>
        <div class="kn-body" id="body${idx}">`;
      if(locked){
        html+=`<div class="pro-lock-body">
          <div class="lock-icon"><i class="ti ti-crown"></i></div>
          <h4>Bu konspekt PRO versiyada</h4>
          <p>Barcha 20 ta konspektga ega bo'lish uchun Professional obunaga o'ting</p>
          <button class="btn-pro" onclick="window.location.href='../premium.html'"><i class="ti ti-crown"></i> PRO olish — 49 000 so'm/oy</button>
        </div>`;
      } else {
        html+=`<div class="kn-content">
          <div class="info-grid">
            <div class="info-box-kn full"><h5><i class="ti ti-target"></i> Maqsad</h5><p>${k.maqsad}</p></div>
            <div class="info-box-kn"><h5><i class="ti ti-tools"></i> Jihozlar</h5><p>${k.jihozlar}</p></div>
            <div class="info-box-kn"><h5><i class="ti ti-brain"></i> Kompetensiya</h5><p>${k.kompetensiya}</p></div>
          </div>
          <h5 style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);margin-bottom:8px;font-weight:700;display:flex;align-items:center;gap:4px"><i class="ti ti-list-details" style="font-size:12px"></i> Darsning borishi (${k.borish.length} bosqich)</h5>
          <div class="steps-grid">
            ${k.borish.map(b=>`<div class="step-box"><div class="step-time">${b.t}</div><div class="step-name">${b.n}</div><div class="step-desc">${b.d}</div></div>`).join('')}
          </div>
          <div class="info-grid">
            <div class="info-box-kn"><h5><i class="ti ti-check"></i> Kutilgan natija</h5><p>${k.natija}</p></div>
            <div class="info-box-kn"><h5><i class="ti ti-info-circle"></i> Tarbiyachi izohi</h5><p>${k.izoh}</p></div>
          </div>
          <button class="btn-print" onclick="prnt(${idx})"><i class="ti ti-printer"></i> Chop etish</button>
        </div>`;
      }
      html+='</div></div>';
    });
  });
  container.innerHTML=html;
}

function tog(id){
  const b=document.getElementById('body'+id);
  const a=document.getElementById('arr'+id);
  b.classList.toggle('open');
  a.style.transform=b.classList.contains('open')?'rotate(180deg)':'rotate(0)';
}

function applyFilter(){
  const h=document.getElementById('f-hafta').value;
  const s=document.getElementById('f-soha').value;
  const k=document.getElementById('f-kun').value;
  render(knList.filter(x=>(!h||x.hafta===h)&&(!s||x.soha===s)&&(!k||x.kun===k)));
}

function resetFilter(){
  document.getElementById('f-hafta').value='';
  document.getElementById('f-soha').value='';
  document.getElementById('f-kun').value='';
  render(knList);
}

function prnt(id){
  const k=knList.find(x=>x.id===id);
  if(!k)return;
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>KN ${k.id} — ${k.mavzu}</title>
  <style>body{font-family:sans-serif;padding:24px;max-width:760px;margin:auto;color:#111;font-size:13px}
  h1{color:#0369a1;font-size:16px;margin-bottom:4px}
  .m{color:#666;font-size:11px;margin-bottom:14px}
  h3{border-bottom:1px solid #e5e7eb;padding-bottom:4px;margin:14px 0 6px;font-size:13px;color:#0369a1}
  .step{background:#e0f2fe;border-radius:6px;padding:8px 10px;margin:5px 0}
  .st{font-size:10px;color:#0369a1;font-weight:700}
  .sn{font-size:12px;font-weight:700;margin:2px 0}
  p{line-height:1.7;margin:4px 0}
  @media print{body{padding:8px}.step{break-inside:avoid}}
  </style></head><body>
  <h1>KN Konspekt #${k.id}: "${k.mavzu}"</h1>
  <div class="m">3–4 yosh | Sentyabr | ${k.hafta} | ${k.kun} | ${k.soha} | ${k.kod} | MaktabgachaHub.uz</div>
  <h3>Maqsad</h3><p>${k.maqsad}</p>
  <h3>Jihozlar</h3><p>${k.jihozlar}</p>
  <h3>Kompetensiya</h3><p>${k.kompetensiya}</p>
  <h3>Darsning borishi</h3>
  ${k.borish.map(b=>`<div class="step"><div class="st">${b.t}</div><div class="sn">${b.n}</div><p>${b.d}</p></div>`).join('')}
  <h3>Kutilgan natija</h3><p>${k.natija}</p>
  <h3>Tarbiyachi izohi</h3><p>${k.izoh}</p>
  </body></html>`);
  w.document.close();w.print();
}

render(knList);
</script>
</body>
</html>
