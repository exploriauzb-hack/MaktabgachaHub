<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MaktabgachaHub — Yillik hisobot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7ff;
  --white:#ffffff;
  --border:#e4e8f0;
  --border2:#d0d7e8;
  --text:#1a1f36;
  --text2:#6b7694;
  --text3:#9aa3bf;
  --accent:#1e40af;
  --accent2:#2563eb;
  --accent-soft:#eff6ff;
  --green:#15803d;
  --green-soft:#f0fdf4;
  --amber:#b45309;
  --amber-soft:#fffbeb;
  --red:#b91c1c;
  --red-soft:#fef2f2;
  --pro:#7c3aed;
  --pro2:#8b5cf6;
  --pro-soft:#f5f3ff;
  --teal:#0d9488;
  --teal-soft:#ccfbf1;
  --sidebar:256px;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 1px 4px rgba(30,40,115,.07),0 4px 16px rgba(30,40,115,.05);
  --shadow-md:0 2px 8px rgba(30,40,115,.1),0 8px 24px rgba(30,40,115,.07);
}
body{font-family:'Inter',sans-serif;color:var(--text);font-size:14px;line-height:1.5;display:flex;min-height:100vh;background:var(--bg)}

.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:30}
.sidebar-logo{padding:20px 18px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent2),#6366f1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.25}
.logo-text span{display:block;font-size:11px;font-weight:400;color:var(--text3);margin-top:2px}
.sidebar-section{padding:18px 18px 6px;font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.09em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);margin:1px 8px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s,color .15s}
.nav-item:hover{background:var(--accent-soft);color:var(--accent)}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav-item i{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.back-link{display:flex;align-items:center;gap:8px;padding:14px 18px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:600;border-bottom:1px solid var(--border)}
.back-link:hover{color:var(--accent2)}

.main{margin-left:var(--sidebar);flex:1;padding:24px 32px 60px;max-width:1180px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-head h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:10px}
.page-head h1 i{color:var(--pro2);font-size:24px}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}
.pro-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;background:var(--pro-soft);color:var(--pro2);border:1px solid #ddd6fe}

.age-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.age-tab{padding:9px 16px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .15s}
.age-tab:hover{border-color:var(--accent2);color:var(--accent2)}
.age-tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}

.toc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;box-shadow:var(--shadow)}
.toc-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.toc-list{display:flex;flex-wrap:wrap;gap:6px}
.toc-link{font-size:12px;font-weight:600;color:var(--accent2);background:var(--accent-soft);padding:5px 10px;border-radius:8px;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.toc-link:hover{background:var(--accent2);color:#fff}

.report-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 34px;display:none}
.report-card.show{display:block}

.report-title{text-align:center;margin-bottom:4px}
.report-title h2{font-size:19px;font-weight:800;color:var(--text)}
.report-title p{font-size:12.5px;color:var(--text3);margin-top:4px}
.report-divider{height:1px;background:var(--border);margin:18px 0}

.info-row{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;margin-bottom:6px;font-size:13px}
.info-row div span{color:var(--text3);font-weight:500}
.info-row div b{color:var(--text);font-weight:600}

.rep-section{scroll-margin-top:20px}
.rep-section h4{font-size:14px;font-weight:700;color:var(--accent2);margin:26px 0 12px;display:flex;align-items:center;gap:7px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rep-section h4 i{font-size:16px}
.rep-section h5{font-size:13px;font-weight:700;color:var(--text);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.rep-section h5 i{font-size:14px;color:var(--pro2)}
.rep-section p{font-size:13.3px;color:var(--text);line-height:1.78;margin-bottom:10px;text-align:justify}
.rep-section ul{padding-left:20px;margin-bottom:10px}
.rep-section ul li{font-size:13.3px;color:var(--text);line-height:1.75;margin-bottom:6px}

.data-table{width:100%;border-collapse:collapse;margin:10px 0 16px}
.data-table th{font-size:11.3px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.03em;text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);background:var(--bg)}
.data-table td{padding:9px 10px;font-size:12.8px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:last-child td{border-bottom:none}
.data-table.compact td, .data-table.compact th{padding:6px 9px;font-size:12.3px}
.growth-tag{display:inline-flex;align-items:center;gap:3px;font-size:11.3px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--green-soft);color:var(--green);white-space:nowrap}

.month-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:120px;margin:14px 0 8px;padding:0 4px}
.month-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
.month-bar{width:100%;max-width:26px;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--accent2),#818cf8)}
.month-bar-label{font-size:10px;color:var(--text3);font-weight:600}
.month-bar-val{font-size:10px;color:var(--text2);font-weight:700}

.soha-block{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:14px;background:var(--bg)}
.soha-block-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.soha-block-head h5{margin:0;font-size:13.5px}
.soha-progress-tag{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--accent-soft);color:var(--accent2)}
.subsoha-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed var(--border2);font-size:12.6px}
.subsoha-row:last-child{border-bottom:none}
.subsoha-name{color:var(--text);flex:1}
.subsoha-bar-track{width:120px;height:7px;background:var(--border);border-radius:99px;overflow:hidden;margin:0 10px;flex-shrink:0}
.subsoha-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),#818cf8);border-radius:99px}
.subsoha-pct{font-weight:700;color:var(--accent2);width:38px;text-align:right;flex-shrink:0}

.tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:10px 0 16px}
.tier-card{border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--border)}
.tier-card.high{background:var(--green-soft);border-color:#bbf7d0}
.tier-card.mid{background:var(--amber-soft);border-color:#fde68a}
.tier-card.low{background:var(--red-soft);border-color:#fecaca}
.tier-num{font-size:24px;font-weight:800;margin-bottom:2px}
.tier-card.high .tier-num{color:var(--green)}
.tier-card.mid .tier-num{color:var(--amber)}
.tier-card.low .tier-num{color:var(--red)}
.tier-label{font-size:12px;font-weight:700;color:var(--text)}
.tier-desc{font-size:11.5px;color:var(--text2);margin-top:4px;line-height:1.5}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0 16px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;text-align:center}
.kpi-val{font-size:20px;font-weight:800;color:var(--accent2)}
.kpi-label{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4}

.check-list{display:flex;flex-direction:column;gap:8px;margin:10px 0 16px}
.check-item{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);background:var(--green-soft);border:1px solid #bbf7d0}
.check-item i{color:var(--green);font-size:16px;margin-top:1px;flex-shrink:0}
.check-item span{font-size:13px;color:var(--text)}

.problem-card{border:1px solid #fecaca;background:var(--red-soft);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px}
.problem-card .p-title{font-size:13px;font-weight:700;color:var(--red);display:flex;align-items:center;gap:6px;margin-bottom:6px}
.problem-card .p-cause{font-size:12.5px;color:var(--text2);margin-bottom:8px}
.problem-card .p-solution{font-size:12.7px;color:var(--text);background:var(--white);border-radius:8px;padding:9px 11px;display:flex;gap:8px;align-items:flex-start}
.problem-card .p-solution i{color:var(--green);margin-top:1px;flex-shrink:0}

.event-list-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.event-list-row:last-child{border-bottom:none}
.event-date-tag{flex-shrink:0;width:74px;font-size:11px;font-weight:700;color:var(--accent2);background:var(--accent-soft);border-radius:6px;padding:4px 6px;text-align:center}
.event-list-row .e-title{font-size:12.8px;font-weight:600;color:var(--text)}
.event-list-row .e-desc{font-size:12.2px;color:var(--text2);margin-top:2px}

.badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mini-badge{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px}
.mini-badge.blue{background:var(--accent-soft);color:var(--accent2)}
.mini-badge.teal{background:var(--teal-soft);color:var(--teal)}
.mini-badge.purple{background:var(--pro-soft);color:var(--pro2)}

.signature-block{display:flex;justify-content:space-between;margin-top:34px;padding-top:20px;border-top:1px dashed var(--border2);font-size:13px}
.signature-block div{text-align:center}
.signature-line{width:170px;border-bottom:1px solid var(--text3);margin-bottom:6px;height:1px}
.signature-block b{font-size:12.5px;color:var(--text2);font-weight:600}

.print-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);background:var(--accent2);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;margin-bottom:18px}
.print-btn:hover{background:var(--accent)}

@media(max-width:980px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px 14px 80px}
  .info-row{grid-template-columns:1fr}
  .tier-grid,.kpi-grid{grid-template-columns:1fr 1fr}
  .signature-block{flex-direction:column;gap:20px;align-items:center}
  .report-card{padding:20px 16px}
}
@media print{
  .sidebar,.age-tabs,.print-btn,.toc{display:none}
  .report-card{display:block!important;box-shadow:none;border:none}
  .main{margin-left:0}
}
</style>
</head>

      text:`Yil boshida bolalarning ko'pchiligida asosiy harakat turlari (yurish, yugurish, sakrash) muvofiqlashtirilmagan holatda edi. Ertalabki badantarbiya, harakatli o'yinlar va mayda motorikani rivojlantiruvchi mashg'ulotlar (mozaika, plastilin, tasmachalar bog'lash) muntazam o'tkazildi. Yil oxiriga kelib bolalarning aksariyati to'pni ushlab-uloqtirish, to'siqlar ustidan sakrash kabi harakatlarni muvofiqlashgan holda bajaradi. Shaxsiy gigiyena ko'nikmalari (qo'l yuvish, sochiq ishlatish) barcha bolalarda mustaqil darajaga yetdi.`

      text:`Faol so'z boyligi yil boshida o'rtacha 80–100 so'zni tashkil etgan bo'lsa, yil oxirida bu ko'rsatkich 250–300 so'zgacha yetdi. Bolalar endi 2–3 so'zdan iborat sodda gaplar tuzadi, kattalardan iltimos qila oladi, his-tuyg'ularini so'z bilan ifodalashga harakat qiladi. Ertaklarni tinglash davomida diqqatni jamlash vaqti 5 daqiqadan 12–15 daqiqagacha o'sdi.`

    },
    {
      name:"Ijodiy rivojlanish",
      icon:"ti-palette", progress:"+27%",

      text:`Bolalar rangli qalam va bo'yoqlar bilan erkin chizishdan tobora maqsadli tasvirlar (quyosh, gul, uy konturlari) yaratishga o'tdilar. Musiqa va ritmga moslashib harakat qilish, oddiy qo'shiqlarni birga kuylash ko'nikmalari shakllandi.`

  tiers:{high:5,mid:11,low:2,note:"Yordamga muhtoj 2 nafar bola asosan nutq rivojlanishi bo'yicha orqada qoladi; ular bilan individual qo'shimcha mashg'ulotlar tashkil etilgan."},

  health:{

  },
  centers:{

    notes:["\"Fan va tabiat\" markazi sensor materiallar (qum, don, rangli suv) bilan boyitildi","\"Qurish-yasash\" markaziga yumshoq kublar qo'shildi","\"Til va nutq\" burchagiga yangi rasmli kitoblar (8 nomda) kiritildi","Yotoqxona mebeli yangilanishga muhtoj — keyingi yilga reja kiritildi"]
  },
  inclusion:{

    work:"Bola logoped bilan haftada 2 marta individual mashg'ulot oldi, ota-onasi bilan uyda bajariladigan mashqlar bo'yicha kelishildi. Yil oxiriga kelib faol so'z boyligi sezilarli oshdi, ammo nazoratni davom ettirish tavsiya etiladi."

const sectionsMeta = [

const container = document.getElementById('reportsContainer');
const tocList = document.getElementById('tocList');

function maxOf(arr){ return Math.max(...arr.map(x=>x[1])); }

function renderReport(age){
  const r = reports[age];
  const maxVal = maxOf(r.monthly);

          ${r.monthly.map(m=>`
            <div class="month-bar-col">
              <span class="month-bar-val">${m[1]}%</span>

              <tr>
                <td>${s[0]}</td>
                <td>${s[1]}</td>
                <td><b>${s[2]}</b></td>
                <td><span class="growth-tag"><i class="ti ti-arrow-up"></i> ${s[3]}</span></td>

      <div class="rep-section" id="health-sec">

        ${r.events.map(e=>`
          <div class="event-list-row">
            <span class="event-date-tag">${e[0]}</span>
            <div>
              <div class="e-title">${e[1]}</div>
              <div class="e-desc">${e[2]}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="rep-section" id="achievements-sec">
        <h4><i class="ti ti-trophy"></i> Yil davomidagi asosiy yutuqlar</h4>
        <div class="check-list">
          ${r.achievements.map(a=>`<div class="check-item"><i class="ti ti-circle-check"></i><span>${a}</span></div>`).join('')}
        </div>
      </div>

      <div class="rep-section" id="problems-sec">
        <h4><i class="ti ti-alert-triangle"></i> Muammolar tahlili va yechim yo'llari</h4>
        ${r.problems.map(p=>`
          <div class="problem-card">
            <div class="p-title"><i class="ti ti-alert-circle"></i> ${p.title}</div>

      <div class="rep-section" id="recommend-sec">
        <h4><i class="ti ti-target-arrow"></i> Keyingi o'quv yili uchun tavsiyalar</h4>

      <div class="signature-block">
        <div>
          <div class="signature-line"></div>
          <b>Tarbiyachi: ${r.teacher}</b>

}

document.querySelectorAll('.age-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.age-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderReport(tab.dataset.age);
  });
});

renderReport('3-4');
</script>
