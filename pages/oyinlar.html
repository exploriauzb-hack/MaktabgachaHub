<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaktabgachaHub — Didaktik O'yinlar</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .game-filters {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .gf-btn {
      padding: 8px 16px; border-radius: 20px; border: 2px solid var(--br);
      background: #fff; color: var(--mu); cursor: pointer;
      font-size: .82rem; font-weight: 600; transition: all .2s;
    }
    .gf-btn:hover { border-color: var(--p); color: var(--p); }
    .gf-btn.active { background: var(--p); color: #fff; border-color: var(--p); }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .game-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      border-top: 4px solid #22c55e;
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .game-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(34,197,94,.15); }

    .game-card-hdr {
      padding: 18px 18px 0;
    }
    .gi { font-size: 2rem; margin-bottom: 8px; }
    .game-card h4 { font-size: .95rem; font-weight: 800; margin-bottom: 6px; }
    .game-card .gdesc { font-size: .82rem; color: var(--mu); line-height: 1.6; margin-bottom: 10px; }

    .game-tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 18px; margin-bottom: 12px; }
    .gs { display: inline-block; background: #f0fff4; color: #166534; border-radius: 8px; padding: 3px 10px; font-size: .7rem; font-weight: 700; }
    .gs.age { background: #fff7ed; color: #92400e; }
    .gs.players { background: #eff6ff; color: #1e40af; }
    .gs.time { background: #fdf2f8; color: #9d174d; }

    .game-footer {
      background: #f8f6ff; padding: 10px 18px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: .78rem; color: var(--p); font-weight: 700;
    }

    /* Modal full detail */
    .gd-section { margin-bottom: 16px; }
    .gd-section h5 {
      font-size: .76rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--p); margin-bottom: 6px; font-weight: 800;
    }
    .gd-section p, .gd-section li { font-size: .87rem; color: var(--tx); line-height: 1.7; }
    .gd-section ol, .gd-section ul { padding-left: 18px; }
    .gd-meta-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .gd-meta-chip {
      background: #f8f6ff; border-radius: 10px; padding: 8px 14px;
      font-size: .8rem; display: flex; align-items: center; gap: 6px;
    }
    .gd-goal-box {
      background: #f0fdf4; border-left: 3px solid #22c55e;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
      font-size: .85rem; color: #166534; line-height: 1.6;
    }
    .gd-variant {
      background: #fff7ed; border-left: 3px solid #f59e0b;
      border-radius: 10px; padding: 12px 16px; font-size: .85rem;
      color: #92400e; line-height: 1.6;
    }
  </style>
</head>
<body>

  </div>

  <div class="game-grid" id="game-grid"></div>

</div>

var currentFilter = 'all'

window.addEventListener('load', async () => {
  const auth = await initAuth(true)
  if (!auth) return
  fillNav()

  if (!hasAccess('games')) {
    document.querySelector('.container').innerHTML = `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:3rem;margin-bottom:14px">🔒</div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:8px">Bu bo'lim Premium uchun</h2>
        <p style="color:var(--mu);margin-bottom:24px">12+ professional didaktik o'yin to'plamiga ega bo'lish uchun Premium oling</p>
        <a href="../premium.html" style="background:linear-gradient(135deg,#6c47ff,#9b7cff);
          color:#fff;padding:13px 30px;border-radius:12px;font-weight:700;display:inline-block">
          ⭐ Premium olish — 49 000 so'm/oy
        </a>
      </div>`
    return
  }

  renderFilters()
  renderGames()
})

function renderFilters() {
  const cats = ['all', ...new Set(gamesData.map(g => g.category))]
  document.getElementById('game-filters').innerHTML = cats.map(c => `
    <button class="gf-btn ${c === 'all' ? 'active' : ''}" data-cat="${c}">
      ${c === 'all' ? "Barchasi" : c}
    </button>
  `).join('')

  document.querySelectorAll('.gf-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentFilter = btn.dataset.cat
      renderGames()
    })
  })
}

function renderGames() {
  const filtered = currentFilter === 'all'
    ? gamesData
    : gamesData.filter(g => g.category === currentFilter)

  document.getElementById('game-grid').innerHTML = filtered.map((g, i) => {
    const realIdx = gamesData.indexOf(g)
    return `
    <div class="game-card" onclick="openGameModal(${realIdx})">
      <div class="game-card-hdr">
        <div class="gi">${g.icon}</div>
        <h4>${g.name}</h4>
        <p class="gdesc">${g.goal.slice(0, 80)}...</p>
      </div>
      <div class="game-tags">
        <span class="gs age">👶 ${g.age}</span>
        <span class="gs players">👥 ${g.players}</span>
        <span class="gs time">⏱️ ${g.time}</span>
      </div>
      <div class="game-footer">
        <span>${g.soha}</span>
        <span>Batafsil →</span>
      </div>
    </div>`
  }).join('')
}

function openGameModal(idx) {
  const g = gamesData[idx]
  document.getElementById('gm-title').textContent = g.icon + ' ' + g.name

  document.getElementById('gm-body').innerHTML = `
    <div class="gd-meta-row">
      <div class="gd-meta-chip">👶 ${g.age}</div>
      <div class="gd-meta-chip">👥 ${g.players}</div>
      <div class="gd-meta-chip">⏱️ ${g.time}</div>
      <div class="gd-meta-chip">📊 ${g.soha}</div>
    </div>

    <div class="gd-goal-box">
      <b>🎯 Maqsad:</b> ${g.goal}
    </div>

    <div class="gd-section">
      <h5>🧰 Kerakli jihozlar</h5>
      <p>${g.materials}</p>
    </div>

    <div class="gd-section">
      <h5>📋 O'tkazish tartibi</h5>
      <ol>${g.rules.map(r => `<li>${r}</li>`).join('')}</ol>
    </div>

    <div class="gd-variant">
      <b>💡 Variatsiya:</b> ${g.variant}
    </div>

    <div class="gd-section" style="margin-top:16px">
      <h5>✅ Kutilgan natija</h5>
      <p>${g.result}</p>
    </div>
  `

  document.getElementById('game-modal').classList.add('show')
}

function closeGameModal() {
  document.getElementById('game-modal').classList.remove('show')
}
</script>

</html>
